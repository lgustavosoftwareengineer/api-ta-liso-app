version: "3"

tasks:
  dev:
    desc: Inicia o servidor em modo desenvolvimento
    cmd: uvicorn app.main:app --reload

  start:
    desc: Roda migrations e inicia o servidor (produção)
    cmd: sh entrypoint.sh

  test:
    desc: Executa todos os testes
    cmd: python -m pytest tests/ -v

  migrate:
    desc: Aplica migrations pendentes (banco local)
    cmd: alembic upgrade head

  migrate:prod:
    desc: Aplica migrations no banco de produção (Supabase). Requer DATABASE_URL como variável de ambiente.
    cmd: alembic upgrade head
    requires:
      vars: [DATABASE_URL]

  migration:
    desc: Cria uma nova migration (use -- msg="descrição")
    cmd: alembic revision --autogenerate -m "{{.msg}}"
